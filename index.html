<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>gaidys.ru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #f7f6f3;
      --text: #2f2f2f;

      --red: #d96c6c;
      --blue: #6c8fd9;
      --yellow: #d9b96c;
      --green: #7dbb91;
      --accent: #b07dd9;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrapper {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-weight: 500;
      letter-spacing: 0.08em;
      font-size: clamp(22px, 4vw, 36px);
    }

    .scene {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 80px;
      flex-wrap: wrap;
    }

    svg {
      width: clamp(180px, 30vw, 300px);
      height: auto;
    }

    /* Анимация */
    .breath {
      transform-origin: center;
      animation: breath 6s ease-in-out infinite;
    }

    .breath2 {
      transform-origin: center;
      animation: breath 7s ease-in-out infinite;
    }

    @keyframes breath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* мобильная версия */
    @media (max-width: 600px) {
      .second {
        display: none;
      }
    }

  </style>
</head>

<body>

<div class="wrapper">
  <h1>gaidys.ru в разработке</h1>

  <div class="scene">

    <!-- Петушок 1 -->
    <svg viewBox="0 0 200 200" class="breath">
      <g transform="translate(100,110)">
        <circle cx="0" cy="0" r="50" fill="var(--red)" opacity="0.85"/>
        <circle cx="60" cy="-40" r="22" fill="var(--yellow)"/>
        <polygon points="80,-40 105,-30 80,-20" fill="#e5a85c"/>

        <polygon points="-50,0 -110,-40 -80,20" fill="var(--blue)"/>
        <polygon points="-50,0 -110,40 -80,-20" fill="var(--green)"/>
        <polygon points="-40,-10 -90,-10 -60,-50" fill="var(--accent)" opacity="0.8"/>

        <circle cx="55" cy="-75" r="8" fill="#c94c4c"/>
        <circle cx="70" cy="-80" r="8" fill="#c94c4c"/>
        <circle cx="85" cy="-75" r="8" fill="#c94c4c"/>
      </g>
    </svg>

    <!-- Петушок 2 -->
    <svg viewBox="0 0 200 200" class="breath2 second">
      <g transform="translate(100,110)">
        <ellipse cx="0" cy="0" rx="55" ry="45" fill="var(--blue)" opacity="0.85"/>
        <circle cx="-60" cy="-40" r="22" fill="var(--green)"/>
        <polygon points="-80,-40 -105,-30 -80,-20" fill="#d4a35a"/>

        <polygon points="50,0 110,-40 80,20" fill="var(--red)"/>
        <polygon points="50,0 110,40 80,-20" fill="var(--yellow)"/>

        <circle cx="15" cy="-15" r="12" fill="var(--accent)" opacity="0.6"/>

        <circle cx="-55" cy="-75" r="7" fill="#b04c4c"/>
        <circle cx="-70" cy="-80" r="7" fill="#b04c4c"/>
        <circle cx="-85" cy="-75" r="7" fill="#b04c4c"/>
      </g>
    </svg>

  </div>
</div>

</body>
</html>
